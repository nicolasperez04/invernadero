name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Get Start Time
        id: time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Compile
        run: ./mvnw clean compile -q

      - name: Run tests + JaCoCo coverage
        run: ./mvnw verify -q

      - name: Package
        run: ./mvnw package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sigma-jar
          path: target/SIGMA-*.jar
          retention-days: 7

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

      - name: Get Build Time
        id: build-time
        run: echo "BUILD_TIME=$(($(date +%s) - START_TIME))" >> $GITHUB_OUTPUT
        env:
          START_TIME: ${{ steps.time.outputs.START_TIME }}

      - name: Generate Test Report
        id: test-report
        run: |
          TESTS_TOTAL=$(grep -r "Tests run:" target/surefire-reports/*.txt 2>/dev/null | sed -E 's/.*Tests run: ([0-9]+).*/\1/' | awk '{sum+=$1} END {print sum}')
          TESTS_TOTAL=${TESTS_TOTAL:-0}

          TESTS_FAILURES=$(grep -r "Failures:" target/surefire-reports/*.txt 2>/dev/null | sed -E 's/.*Failures: ([0-9]+).*/\1/' | awk '{sum+=$1} END {print sum}')
          TESTS_FAILURES=${TESTS_FAILURES:-0}

          TESTS_ERRORS=$(grep -r "Errors:" target/surefire-reports/*.txt 2>/dev/null | sed -E 's/.*Errors: ([0-9]+).*/\1/' | awk '{sum+=$1} END {print sum}')
          TESTS_ERRORS=${TESTS_ERRORS:-0}

          TESTS_SKIPPED=$(grep -r "Skipped:" target/surefire-reports/*.txt 2>/dev/null | sed -E 's/.*Skipped: ([0-9]+).*/\1/' | awk '{sum+=$1} END {print sum}')
          TESTS_SKIPPED=${TESTS_SKIPPED:-0}

          TESTS_PASSED=$((TESTS_TOTAL - TESTS_FAILURES - TESTS_ERRORS - TESTS_SKIPPED))

          echo "TESTS_TOTAL=$TESTS_TOTAL" >> $GITHUB_OUTPUT
          echo "TESTS_PASSED=$TESTS_PASSED" >> $GITHUB_OUTPUT
          echo "TESTS_FAILURES=$TESTS_FAILURES" >> $GITHUB_OUTPUT
          echo "TESTS_ERRORS=$TESTS_ERRORS" >> $GITHUB_OUTPUT
          echo "TESTS_SKIPPED=$TESTS_SKIPPED" >> $GITHUB_OUTPUT

      - name: Generate CI Summary
        run: |
          BUILD_TIME="${{ steps.build-time.outputs.BUILD_TIME }}"
          BUILD_STATUS="✅ Success"

          if [ "$BUILD_TIME" -ge 60 ]; then
            BUILD_TIME_STR="$((BUILD_TIME / 60))m $((BUILD_TIME % 60))s"
          else
            BUILD_TIME_STR="${BUILD_TIME}s"
          fi

          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $BUILD_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | $BUILD_TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tests" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total | ${{ steps.test-report.outputs.TESTS_TOTAL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ✅ ${{ steps.test-report.outputs.TESTS_PASSED }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ❌ ${{ steps.test-report.outputs.TESTS_FAILURES }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | ⚠️ ${{ steps.test-report.outputs.TESTS_ERRORS }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ⏭️ ${{ steps.test-report.outputs.TESTS_SKIPPED }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- \`sigma-jar\` (92 MB) - disponible 7 días" >> $GITHUB_STEP_SUMMARY
        env:
          BUILD_TIME: ${{ steps.build-time.outputs.BUILD_TIME }}

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const csv = fs.readFileSync('target/site/jacoco/jacoco.csv', 'utf8');
            const rows = csv.trim().split('\n').slice(1);

            let lm = 0, lc = 0, bm = 0, bc = 0;
            for (const row of rows) {
              const c = row.split(',');
              lm += Number(c[7]);
              lc += Number(c[8]);
              bm += Number(c[5]);
              bc += Number(c[6]);
            }

            const linePct = Math.round(lc / (lm + lc) * 100);
            const brPct   = bc + bm > 0 ? Math.round(bc / (bc + bm) * 100) : 100;
            const passes  = linePct >= 80 && brPct >= 60;
            const emoji   = passes ? '✅' : '❌';

            const body = `${emoji} **Code Coverage Report**

            | Métrica | Cobertura | Umbral |
            |---------|-----------|--------|
            | Líneas  | ${linePct}% | 80% |
            | Ramas   | ${brPct}% | 60% |

            ${!passes ? '⚠️ La cobertura está por debajo del umbral. Agrega tests antes de mergear.' : ''}

            📦 [Descargar reporte detallado](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            <!-- coverage-report -->`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- coverage-report -->';
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

